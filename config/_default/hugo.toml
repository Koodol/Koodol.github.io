# Structural site configuration. Owner-editable settings (identity, social links,
# palette, enabled sections) live in params.yaml so the /admin dashboard can edit
# them as YAML. Per-language param overrides stay here under [languages.<lang>.params].
baseURL = "https://Koodol.github.io/"
locale = "en"
title = "Minseo Koo"
defaultContentLanguage = "en"

[taxonomies]
  tag = "tags"

[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Languages. The default (defaultContentLanguage above) lives at /, others at /<lang>/.
[languages]
  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
  [languages.ko]
    label = "한국어"
    locale = "ko"
    weight = 2
    [languages.ko.params]
      description = "GIST DS Lab 석사과정"
      tagline = "지도교수: 김선동 교수님"
