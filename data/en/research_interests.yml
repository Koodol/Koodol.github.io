# Each entry becomes a page at /research-interests/<slugified-title>/.
# `details` is markdown and renders as the page body. A publication links here
# when its `interest` field matches one of these titles exactly.
- title: Generalizable Reasoning with LLMs
  summary: Using large language models to solve abstract reasoning tasks like the ARC (Abstraction and Reasoning Corpus) benchmark - and, more broadly, understanding what makes a reasoning strategy generalize rather than overfit to one benchmark.
  details: |
    This direction isn't fully settled yet, but the starting point is applying LLMs to
    ARC-style abstract reasoning puzzles. Rather than chasing benchmark-specific tricks,
    the goal is to study what makes a reasoning process transfer across tasks the model
    hasn't seen - i.e., generalizable reasoning rather than memorized pattern-matching on
    a single benchmark.
- title: Text Mining & Dialogue Systems
  summary: Making text mining and NLU systems robust across data sources - from platform-invariant topic modeling to intent/utterance classification.
  details: |
    Undergraduate research on how the source platform of a text corpus can bias topic
    models, and how contrastive learning can remove that bias (published at EMNLP 2024
    Findings). Related work applied KoBERT to utterance-based classification tasks in
    dialogue/prediction systems.
