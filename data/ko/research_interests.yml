# 한국어 데이터. `title`은 슬러그와 언어 간 연결에 쓰이므로 영어(data/en)와 동일하게 유지하고,
# 산문(summary, details)만 번역하세요.
- title: Generalizable Reasoning with LLMs
  summary: LLM을 활용해 ARC(Abstraction and Reasoning Corpus) 같은 추상적 추론 문제를 푸는 연구입니다. 더 넓게는 하나의 벤치마크에 overfitting되지 않고 일반화되는 추론 전략이 무엇인지를 이해하는 것이 목표입니다.
  details: |
    아직 구체적으로 정해진 방향은 아니지만, LLM을 이용해 ARC 스타일의 추상 추론 문제를
    푸는 것에서 출발합니다. 벤치마크에 특화된 트릭을 쫓기보다는, 모델이 본 적 없는
    문제로도 전이되는 추론 과정 - 즉 하나의 벤치마크에 몰리지 않고 일반화되는 추론 능력 -
    이 무엇인지 연구하고자 합니다.
- title: Text Mining & Dialogue Systems
  summary: 플랫폼에 영향받지 않는(platform-invariant) 토픽 모델링부터 발화 기반 분류까지, 다양한 출처의 텍스트에도 강건한 텍스트 마이닝·NLU 시스템을 연구했습니다.
  details: |
    학부 시절 진행한 연구로, 텍스트 코퍼스의 출처 플랫폼이 토픽 모델에 편향을 만드는
    문제와 이를 대조 학습(contrastive learning)으로 완화하는 방법을 다뤘습니다
    (EMNLP 2024 Findings 게재). 관련 연구로 KoBERT를 활용해 발화 기반 분류를
    수행하는 대화·예측 시스템 연구도 진행했습니다.
