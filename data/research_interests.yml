- title: Abstract Reasoning & ARC
  summary: How can machines acquire the kind of fluid, compositional reasoning that ARC-style tasks demand?
  details: |
    The Abstraction and Reasoning Corpus (ARC) resists the pattern-matching that powers most modern models: each task is novel, few-shot, and solvable only by composing a small set of human-intuitive priors. I study how to give models
    those priors explicitly and how to evaluate genuine reasoning rather than memorization. testing [link](/research-interests/)
- title: Human-Intuitive Analogy
  summary: Aligning a model's problem-solving with the analogies humans reach for first.
  details: |
    People solve unfamiliar problems by mapping them onto familiar ones. My work (e.g. **GIFARC**) builds datasets and training signals that surface these analogies, so a model's first guess looks more like a human's - fewer brittle
    shortcuts, more transferable structure.
- title: Reasoning & the Philosophy of Science
  summary: What the history of physics can teach us about interpreting learned representations.
  details: |
    Deep learning often feels like an empirical science still waiting for its theory. I'm interested in what the conceptual upheavals of early quantum mechanics suggest about how we should interpret (and trust) the high-dimensional representations our models learn.
